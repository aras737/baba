<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to Roblox</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #191b1d; /* Arkadaki koyu arka plan */
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.rbxcdn.com/97491cf0eb8201a056a004eb651c6c51.jpg'); /* Opsiyonel Roblox arka plan görseli */
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Giriş Kutusu (Modal) */
        .login-container {
            background-color: #2b2d2f;
            width: 100%;
            max-width: 440px;
            padding: 35px 30px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        /* Giriş Alanları (Inputs) */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            background-color: #393b3d;
            border: 1px solid #55585a;
            border-radius: 4px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
        }

        .input-group input::placeholder {
            color: #85888a;
        }

        .input-group input:focus {
            border-color: #ffffff;
        }

        /* Ana Giriş Butonu */
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            border: 1px solid #ffffff;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-login:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Linkler */
        .forgot-link {
            display: inline-block;
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            margin: 25px 0;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* Diğer Butonlar */
        .btn-secondary {
            width: 100%;
            padding: 14px;
            background-color: #393b3d;
            border: none;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background 0.2s;
        }

        .btn-secondary:hover {
            background-color: #484a4c;
        }

        /* Alt Kısım (Kayıt Ol) */
        .signup-text {
            color: #b8b8b8;
            font-size: 13px;
            margin-top: 25px;
        }

        .signup-text a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Login to Roblox</h2>
        
        <form onsubmit="event.preventDefault();">
            <div class="input-group">
                <input type="text" placeholder="Username/Email/Phone" required>
            </div>
            
            <div class="input-group">
                <input type="password" placeholder="Password" required>
            </div>
            
            <button type="submit" class="btn-login">Log In</button>
        </form>

        <a href="#" class="forgot-link">Forgot Password or Username?</a>

        <button class="btn-secondary">Email Me a One-Time Code</button>
        <button class="btn-secondary">Use Another Device</button>

        <div class="signup-text">
            Don't have an account? <a href="#">Sign Up</a>
        </div>
    </div>

</body>
</html>
