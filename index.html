<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Login Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1e2022 0%, #0c0d0e 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Arka plandaki bulanık oyun görselleri efekti */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }

        /* --- ÜST MENÜ (NAVBAR) --- */
        .navbar {
            width: 100%;
            height: 60px;
            background-color: #191b1d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid #2d3035;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* CSS ile Yapılmış Roblox Logosu */
        .roblox-logo {
            width: 24px;
            height: 24px;
            background-color: #ffffff;
            transform: rotate(-15deg);
            margin-right: 5px;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            font-size: 14px;
            font-weight: 600;
            color: #cbcccd;
        }

        .nav-links span {
            cursor: pointer;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-signup-top {
            background-color: #0074f4;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }

        .search-icon {
            cursor: pointer;
            fill: #ffffff;
            width: 20px;
            height: 20px;
        }

        /* --- GİRİŞ PANELİ (MODAL) --- */
        .login-container {
            background-color: #25272a;
            width: 100%;
            max-width: 440px;
            margin-top: auto;
            margin-bottom: auto;
            padding: 30px 25px;
            border-radius: 4px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            text-align: center;
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        /* Input Alanları */
        .input-group {
            margin-bottom: 12px;
        }

        .input-field {
            width: 100%;
            background-color: #393b3d;
            border: 1px solid #55585c;
            color: #ffffff;
            padding: 14px;
            border-radius: 4px;
            font-size: 15px;
            outline: none;
        }

        .input-field::placeholder {
            color: #85888b;
        }

        .input-field:focus {
            border-color: #ffffff;
        }

        /* Butonlar */
        .btn-login {
            width: 100%;
            background-color: transparent;
            border: 1px solid #ffffff;
            color: #ffffff;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 5px;
            margin-bottom: 25px;
            transition: background 0.2s;
        }

        .btn-login:hover {
            background-color: rgba(255,255,255,0.1);
        }

        .forgot-link {
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 35px;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn-secondary {
            width: 100%;
            background-color: #393b3d;
            border: none;
            color: #ffffff;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background 0.2s;
        }

        .btn-secondary:hover {
            background-color: #484a4d;
        }

        /* Alt Kısım Kayıt Ol Yazısı */
        .footer-signup {
            margin-top: 25px;
            font-size: 13px;
            color: #b8b9ba;
        }

        .footer-signup a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        .footer-signup a:hover {
            text-decoration: underline;
        }

        /* Mobil Cihazlar İçin Uyum */
        @media (max-width: 480px) {
            .navbar {
                padding: 0 10px;
            }
            .nav-links {
                display: none; /* Mobilde orta linkler gizlenir */
            }
            .login-container {
                max-width: 100%;
                height: calc(100vh - 60px);
                border-radius: 0;
                box-shadow: none;
                padding-top: 50px;
            }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <div class="roblox-logo"></div>
            <div class="nav-links">
                <span>Charts</span>
                <span>Marketplace</span>
                <span>Create</span>
                <span>Robux</span>
            </div>
        </div>
        <div class="nav-right">
            <button class="btn-signup-top">Sign Up</button>
            <svg class="search-icon" viewBox="0 0 24 24">
                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
        </div>
    </header>

    <main class="login-container">
        <h1 class="login-title">Login to Roblox</h1>
        
        <form onsubmit="event.preventDefault();">
            <div class="input-group">
                <input type="text" class="input-field" placeholder="Username/Email/Phone" autocomplete="username">
            </div>
            
            <div class="input-group">
                <input type="password" class="input-field" placeholder="Password" autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-login">Log In</button>
        </form>

        <a href="#" class="forgot-link">Forgot Password or Username?</a>

        <button class="btn-secondary">Email Me a One-Time Code</button>
        <button class="btn-secondary">Use Another Device</button>

        <div class="footer-signup">
            Don't have an account? <a href="#">Sign Up</a>
        </div>
    </main>

</body>
</html>
